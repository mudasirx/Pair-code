services:
  # WhatsApp pairing website (Node)
  - type: web
    name: whatsapp-bot-pairing
    env: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: SESSIONS_DIR
        value: /var/data/sessions
      - key: LOG_LEVEL
        value: info
    disk:
      name: sessions
      mountPath: /var/data
      sizeGB: 1

  # mysmsportal -> Telegram polling worker (Python)
  - type: worker
    name: mysmsportal-telegram-bot
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: MYSMSPORTAL_USERNAME
        sync: false
      - key: MYSMSPORTAL_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: POLL_INTERVAL_SECONDS
        value: "30"
      - key: STARTUP_NOTIFY
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
