services:
  - type: worker
    name: mysmsportal-telegram-bot
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: MYSMSPORTAL_USERNAME
        sync: false
      - key: MYSMSPORTAL_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: POLL_INTERVAL_SECONDS
        value: "30"
      - key: STARTUP_NOTIFY
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: worker
    name: mysmsportal-whatsapp-bot
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci --omit=dev
    startCommand: node whatsapp_bot.js
    disk:
      name: whatsapp-auth
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: MYSMSPORTAL_USERNAME
        sync: false
      - key: MYSMSPORTAL_PASSWORD
        sync: false
      - key: WHATSAPP_PHONE_NUMBER
        sync: false
      - key: WHATSAPP_TARGET
        sync: false
      - key: WHATSAPP_AUTH_BASE64
        sync: false
      # Optional: if both are set, the pairing code is also relayed to the
      # Telegram chat on first boot. Useful when you'd rather not hunt for
      # it in the Render log stream. Reuse the same values as the Telegram
      # worker above.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: AUTH_DIR
        value: /var/data/auth_info_baileys
      - key: POLL_INTERVAL_SECONDS
        value: "30"
      - key: STARTUP_NOTIFY
        value: "true"
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NODE_NO_WARNINGS
        value: "1"
